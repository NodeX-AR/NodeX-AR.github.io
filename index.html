<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Aswanth R | NodeX-AR — Cinematic One‑Pager</title>
  
  <!-- SEO, favicons (keep your own) -->
  <meta name="description" content="NodeX-AR | Aswanth R - Ethical Hacker, Python Developer. Scroll‑driven cinematic portfolio.">
  <meta name="author" content="Aswanth R (NodeX-AR)">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #03030c;
      font-family: 'Inter', sans-serif;
      color: #e0e0e0;
      overflow-x: hidden;
    }
    /* 3D canvas background */
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    /* scroll tracker – 250vh → just enough for 4 scenes */
    .scroll-tracker {
      position: relative;
      height: 250vh;
      z-index: 1;
      pointer-events: none;
    }
    /* fixed content panel – glass, centered */
    .fixed-content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 1000px;
      z-index: 20;
      background: rgba(8, 8, 18, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 2rem;
      border: 1px solid rgba(0, 255, 65, 0.25);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transition: background 0.2s;
      pointer-events: auto;
    }
    /* crossfade layers */
    .scene-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      pointer-events: none;
      overflow-y: auto;
    }
    .scene-layer.active {
      opacity: 1;
      pointer-events: auto;
    }
    /* scroll progress bar (elegant) */
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, #00ff41, #4facfe);
      z-index: 1000;
      transition: width 0.1s linear;
    }
    /* hero layout */
    .hero-flex {
      display: flex;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #00ff41;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
    }
    .hero-content {
      text-align: left;
      flex: 1;
      min-width: 240px;
    }
    .badge {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #00ff41;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      font-family: 'Space Grotesk', monospace;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .gradient-text {
      background: linear-gradient(125deg, #fff, #00ff41);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .desc {
      font-size: 1rem;
      color: #ccc;
      margin-bottom: 1.5rem;
    }
    .stats-grid, .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .stat-card, .skill-card {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,255,65,0.2);
      border-radius: 1rem;
      padding: 1rem;
      transition: 0.2s;
    }
    .stat-card:hover, .skill-card:hover {
      transform: translateY(-3px);
      border-color: #00ff41;
    }
    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: #00ff41;
    }
    .skill-icon {
      font-size: 2rem;
      color: #00ff41;
      margin-bottom: 0.5rem;
      display: block;
    }
    .contact-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }
    .contact-link {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(0,255,65,0.3);
      border-radius: 60px;
      padding: 0.7rem 1.5rem;
      text-decoration: none;
      color: #e0e0e0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .contact-link:hover {
      background: #00ff41;
      color: #000;
    }
    .quote {
      font-style: italic;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #aaa;
      border-left: 2px solid #00ff41;
      padding-left: 1rem;
      text-align: left;
    }
    .music-control {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,255,65,0.5);
      color: #00ff41;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .music-control:hover {
      background: #00ff41;
      color: #000;
      transform: scale(1.05);
    }
    @media (max-width: 800px) {
      .hero-flex { flex-direction: column; text-align: center; }
      .hero-content { text-align: center; }
      h1 { font-size: 2.5rem; }
      .fixed-content { padding: 1rem; width: 95%; }
      .scene-layer { padding: 1rem; }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>
<div class="scroll-tracker"></div>
<div class="progress-bar" id="progressBar"></div>

<div class="fixed-content">
  <div id="sceneLayerA" class="scene-layer active"></div>
  <div id="sceneLayerB" class="scene-layer"></div>
</div>

<button id="audioControl" class="music-control" aria-label="Play/Pause music">
  <i class="fas fa-play"></i>
</button>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // --- 3D Scene Setup (globe) ---
  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03030c);
  scene.fog = new THREE.FogExp2(0x03030c, 0.018);
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 18);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);
  
  const renderScene = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
  bloomPass.threshold = 0;
  bloomPass.strength = 1.2;
  const composer = new EffectComposer(renderer);
  composer.addPass(renderScene);
  composer.addPass(bloomPass);
  
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.enableZoom = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.7;
  
  // Core icosahedron
  const coreGeo = new THREE.IcosahedronGeometry(1.6, 1);
  const coreMat = new THREE.MeshStandardMaterial({ color: 0x00ff41, roughness: 0.2, metalness: 0.7, emissive: 0x00ff41, emissiveIntensity: 0.3 });
  const core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);
  // wireframe cage
  const cageGeo = new THREE.IcosahedronGeometry(2.0, 1);
  const cageMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 });
  const cage = new THREE.Mesh(cageGeo, cageMat);
  scene.add(cage);
  // particle ring
  const particleCount = 80;
  const particleGeo = new THREE.BufferGeometry();
  const particlePositions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const angle = (i / particleCount) * Math.PI * 2;
    particlePositions[i*3] = Math.cos(angle) * 4.5;
    particlePositions[i*3+1] = Math.sin(angle) * 4.5;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  const particleMat = new THREE.PointsMaterial({ size: 0.12, color: 0x00ff41, blending: THREE.AdditiveBlending });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);
  // grid floor
  const gridHelper = new THREE.GridHelper(30, 30, 0x00ff41, 0x336633);
  gridHelper.position.y = -3.5;
  scene.add(gridHelper);
  // stars background
  const starsGeo = new THREE.BufferGeometry();
  const starsCount = 1400;
  const starsPos = new Float32Array(starsCount * 3);
  for (let i = 0; i < starsCount; i++) {
    starsPos[i*3] = (Math.random() - 0.5) * 200;
    starsPos[i*3+1] = (Math.random() - 0.5) * 100;
    starsPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
  const starsMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.07, transparent: true, opacity: 0.6 });
  const stars = new THREE.Points(starsGeo, starsMat);
  scene.add(stars);
  
  // --- audio reactivity (with fallback) ---
  let audioCtx = null, analyser = null, source = null, isPlaying = false;
  let audioBuffer = null;
  async function loadAudio() {
    try {
      const resp = await fetch('bg.mp3');
      if (!resp.ok) return null;
      const buf = await resp.arrayBuffer();
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      return await ctx.decodeAudioData(buf);
    } catch { return null; }
  }
  loadAudio().then(buf => audioBuffer = buf);
  async function startMusic() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    if (audioBuffer) {
      if (source) source.stop();
      const src = audioCtx.createBufferSource();
      src.buffer = audioBuffer;
      src.loop = true;
      if (!analyser) {
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
      }
      src.connect(analyser);
      analyser.connect(audioCtx.destination);
      src.start();
      source = src;
      isPlaying = true;
      document.getElementById('audioControl').innerHTML = '<i class="fas fa-pause"></i>';
    }
  }
  function stopMusic() { if (source) source.stop(); isPlaying = false; document.getElementById('audioControl').innerHTML = '<i class="fas fa-play"></i>'; }
  function toggleMusic() { isPlaying ? stopMusic() : startMusic(); }
  document.getElementById('audioControl').addEventListener('click', toggleMusic);
  window.addEventListener('click', () => { if (!audioCtx) startMusic(); }, { once: true });
  window.addEventListener('scroll', () => { if (!audioCtx) startMusic(); }, { once: true });
  function getAudioIntensity() {
    if (isPlaying && analyser && audioCtx?.state === 'running') {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let v of data) sum += v;
      return Math.min(1, sum / (data.length * 255) * 1.2);
    }
    return 0.2 + Math.sin(Date.now() * 0.002) * 0.1;
  }
  
  // --- scene content (polished text) ---
  const scenes = [
    { 
      id: 'hero',
      html: `
        <div class="hero-flex">
          <img src="/aswanth-r-nodex-ar.png" alt="Aswanth R" class="profile-img" onerror="this.src='https://avatars.githubusercontent.com/u/139892046?v=4'">
          <div class="hero-content">
            <div class="badge">✦ ETHICAL HACKER / PYTHON DEV</div>
            <h1>Breaking <span class="gradient-text">systems</span><br>fixing <span class="gradient-text">code</span></h1>
            <p class="desc">ISC2 Candidate · Penetration testing · Python automation · Code fixer. 1000+ contributions.</p>
            <div class="quote">“If it’s code, I can fix it.” — Aswanth R</div>
          </div>
        </div>
      `
    },
    {
      id: 'stats',
      html: `
        <h2 class="gradient-text" style="font-size:2rem; margin-bottom:1rem;">Impact</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-number">1000+</div><div class="stat-label">CONTRIBUTIONS</div></div>
          <div class="stat-card"><div class="stat-number">30+</div><div class="stat-label">ACTIVE REPOS</div></div>
          <div class="stat-card"><div class="stat-number">50000+</div><div class="stat-label">LINES FIXED</div></div>
          <div class="stat-card"><div class="stat-number">1500+</div><div class="stat-label">BREACHES</div></div>
        </div>
        <div class="quote" style="margin-top:1.5rem;">Every line of code tells a story of resilience.</div>
      `
    },
    {
      id: 'skills',
      html: `
        <h2 class="gradient-text" style="font-size:2rem; margin-bottom:1rem;">Arsenal</h2>
        <div class="skills-grid">
          <div class="skill-card"><i class="fab fa-python skill-icon"></i><div class="skill-title">PYTHON</div><div>Advanced • Automation • Exploit Dev</div></div>
          <div class="skill-card"><i class="fas fa-lock skill-icon"></i><div class="skill-title">ETHICAL HACKING</div><div>Pen Testing • Reverse Engineering</div></div>
          <div class="skill-card"><i class="fas fa-globe skill-icon"></i><div class="skill-title">WEB TECH</div><div>JS/HTML/CSS • React • Node.js</div></div>
          <div class="skill-card"><i class="fas fa-bolt skill-icon"></i><div class="skill-title">CODE FIXER</div><div>Debug • Refactor • Optimize</div></div>
        </div>
      `
    },
    {
      id: 'contact',
      html: `
        <h2 class="gradient-text" style="font-size:2rem; margin-bottom:1rem;">Connect</h2>
        <div class="contact-links">
          <a href="https://github.com/Nodex-AR" target="_blank" class="contact-link"><i class="fab fa-github"></i> GitHub</a>
          <a href="#" id="secureEmailBtn" class="contact-link"><i class="fas fa-envelope"></i> Secure Message</a>
        </div>
        <div class="quote" style="margin-top:1.5rem;">Let’s build something secure together.</div>
      `
    }
  ];
  
  // crossfade layers
  const layerA = document.getElementById('sceneLayerA');
  const layerB = document.getElementById('sceneLayerB');
  let activeLayer = 'A';
  let currentSceneIdx = 0;
  
  function setSceneContent(layer, html) {
    layer.innerHTML = html;
    const emailBtn = layer.querySelector('#secureEmailBtn');
    if (emailBtn) {
      emailBtn.addEventListener('click', (e) => {
        e.preventDefault();
        navigator.clipboard.writeText('aswanthr82@gmail.com');
        const btn = e.currentTarget;
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => btn.innerHTML = orig, 1500);
      });
    }
  }
  
  setSceneContent(layerA, scenes[0].html);
  layerA.classList.add('active');
  layerB.classList.remove('active');
  
  // ScrollTrigger with crossfade and progress bar
  const tracker = document.querySelector('.scroll-tracker');
  const progressBar = document.getElementById('progressBar');
  const totalScenes = scenes.length;
  
  ScrollTrigger.create({
    trigger: tracker,
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1.2,
    onUpdate: (self) => {
      const progress = self.progress;
      progressBar.style.width = (progress * 100) + '%';
      const targetIndex = Math.min(Math.floor(progress * totalScenes), totalScenes - 1);
      if (targetIndex !== currentSceneIdx) {
        currentSceneIdx = targetIndex;
        const activeElem = activeLayer === 'A' ? layerA : layerB;
        const inactiveElem = activeLayer === 'A' ? layerB : layerA;
        setSceneContent(inactiveElem, scenes[currentSceneIdx].html);
        gsap.to(activeElem, { duration: 0.55, opacity: 0, ease: 'power2.inOut', onComplete: () => {
          activeElem.classList.remove('active');
          inactiveElem.classList.add('active');
          gsap.to(inactiveElem, { duration: 0.55, opacity: 1, ease: 'power2.inOut' });
          activeLayer = activeLayer === 'A' ? 'B' : 'A';
        }});
      }
      
      // Globe transformation based on scroll progress (0..1)
      const prog = progress;
      const r = Math.min(1, prog * 1.2);
      const g = 1;
      const b = Math.min(1, 0.2 + prog * 0.8);
      coreMat.color.setRGB(r, g, b);
      coreMat.emissive.setRGB(r, g, b);
      coreMat.emissiveIntensity = 0.3 + prog * 0.7;
      const scaleCore = 1 + prog * 0.45;
      const scaleCage = 1 + prog * 0.25;
      core.scale.setScalar(scaleCore);
      cage.scale.setScalar(scaleCage);
      const particleRad = 4.5 + prog * 3;
      const positions = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const angle = (i / particleCount) * Math.PI * 2;
        positions[i*3] = Math.cos(angle) * particleRad;
        positions[i*3+1] = Math.sin(angle) * particleRad;
      }
      particles.geometry.attributes.position.needsUpdate = true;
      bloomPass.strength = 1.0 + prog * 1.2;
      stars.rotation.y = prog * 2.2;
    }
  });
  
  // additional music pulse
  let lastTime = 0;
  function animateMusic() {
    requestAnimationFrame(animateMusic);
    const intensity = getAudioIntensity();
    controls.autoRotateSpeed = 0.6 + intensity * 0.6;
    controls.update();
    composer.render();
  }
  animateMusic();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
