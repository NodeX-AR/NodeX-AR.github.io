<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Aswanth R | NodeX-AR</title>
  <meta name="description" content="NodeX-AR | Aswanth R - Ethical Hacker, Python Developer. Music‑reactive 3D portfolio.">
  <meta name="author" content="Aswanth R (NodeX-AR)">
  <link rel="icon" type="image/png" sizes="48x48" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300ff41'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z'/%3E%3C/svg%3E">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #03030c;
      font-family: 'Inter', sans-serif;
      color: #e0e0e0;
      overflow-x: hidden;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .scroll-tracker {
      position: relative;
      height: 300vh;
      z-index: 1;
      pointer-events: none;
    }
    .fixed-content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 1000px;
      z-index: 20;
      text-align: center;
      background: transparent;
      backdrop-filter: none;
      border: none;
      border-radius: 0;
      padding: 2rem 2rem;
      pointer-events: auto;
    }
    .scene-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 0.5rem;
      opacity: 0;
      transition: opacity 0.55s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .scene-layer.active {
      opacity: 1;
      pointer-events: auto;
    }
    .hero-flex {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      text-align: left;
    }
    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid #00ff41;
      box-shadow: 0 0 20px rgba(0,255,65,0.3);
      background: #0a0a0a;
    }
    .hero-content {
      text-align: left;
      flex: 1;
      min-width: 260px;
    }
    .badge {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: #00ff41;
      margin-bottom: 0.6rem;
      font-weight: 500;
    }
    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      font-family: 'Space Grotesk', monospace;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .gradient-text {
      background: linear-gradient(125deg, #fff, #00ff41);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .desc {
      font-size: 1rem;
      color: #ddd;
      margin-bottom: 1.25rem;
      line-height: 1.4;
    }
    .stats-grid, .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.25rem;
      margin: 1.8rem auto 0;
      width: 100%;
    }
    .stat-card, .skill-card {
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(0, 255, 65, 0.35);
      border-radius: 1.25rem;
      padding: 1.2rem 0.8rem;
      transition: 0.2s ease;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .stat-card:hover, .skill-card:hover {
      border-color: #00ff41;
      background: rgba(0, 255, 65, 0.1);
      transform: translateY(-2px);
    }
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: #00ff41;
      margin-bottom: 0.3rem;
    }
    .stat-label, .skill-title {
      font-weight: 500;
      letter-spacing: 1px;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #ccc;
    }
    .skill-icon {
      font-size: 2.2rem;
      color: #00ff41;
      margin-bottom: 0.6rem;
      display: inline-block;
    }
    .skill-card div:last-child {
      font-size: 0.73rem;
      color: #ccc;
      margin-top: 0.4rem;
    }
    .contact-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin: 1.2rem 0 0.5rem;
    }
    .contact-link {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 65, 0.5);
      border-radius: 60px;
      padding: 0.7rem 1.8rem;
      text-decoration: none;
      color: #e0e0e0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: 0.2s;
      font-weight: 500;
    }
    .contact-link:hover {
      background: #00ff41;
      color: #000;
      border-color: #00ff41;
    }
    .quote {
      font-style: italic;
      margin-top: 1.8rem;
      font-size: 0.9rem;
      color: #ccc;
      border-left: 3px solid #00ff41;
      padding-left: 1.2rem;
      text-align: left;
      background: rgba(0,0,0,0.3);
      border-radius: 0 0.6rem 0.6rem 0;
      width: fit-content;
      max-width: 90%;
    }
    .music-control {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 255, 65, 0.7);
      color: #00ff41;
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .music-control:hover {
      background: #00ff41;
      color: #000;
      transform: scale(1.05);
    }
    @media (max-width: 800px) {
      .hero-flex { flex-direction: column; text-align: center; gap: 1.5rem; }
      .hero-content { text-align: center; }
      h1 { font-size: 2.3rem; }
      .fixed-content { padding: 1.2rem; width: 94%; }
      .scene-layer { padding: 0.5rem; }
      .quote { text-align: center; border-left: none; border-top: 2px solid #00ff41; padding-left: 0; padding-top: 0.8rem; width: 100%; margin-top: 1.5rem; }
      .stats-grid, .skills-grid { gap: 0.9rem; margin-top: 1.2rem; }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>
<div class="scroll-tracker"></div>

<div class="fixed-content">
  <div id="sceneLayerA" class="scene-layer active"></div>
  <div id="sceneLayerB" class="scene-layer"></div>
</div>

<button id="audioControl" class="music-control" aria-label="Play/Pause music">
  <i class="fas fa-play"></i>
</button>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

  // ---- 3D SCENE ----
  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x03030c);
  scene.fog = new THREE.FogExp2(0x03030c, 0.02);
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 1.6, 16);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);
  
  const renderScene = new RenderPass(scene, camera);
  const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.5, 0.8);
  bloomPass.threshold = 0.05;
  bloomPass.strength = 0.85;
  const composer = new EffectComposer(renderer);
  composer.addPass(renderScene);
  composer.addPass(bloomPass);
  
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.enableZoom = false;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.65;
  
  // Core geometry
  const coreGeo = new THREE.IcosahedronGeometry(1.6, 1);
  const coreMat = new THREE.MeshStandardMaterial({ color: 0x00ff41, roughness: 0.25, metalness: 0.7, emissive: 0x00ff41, emissiveIntensity: 0.55 });
  const core = new THREE.Mesh(coreGeo, coreMat);
  scene.add(core);
  
  // Wireframe cage
  const cageGeo = new THREE.IcosahedronGeometry(2.05, 1);
  const cageMat = new THREE.MeshBasicMaterial({ color: 0x88ff88, wireframe: true, transparent: true, opacity: 0.25 });
  const cage = new THREE.Mesh(cageGeo, cageMat);
  scene.add(cage);
  
  // Particle ring
  const particleCount = 90;
  const particleGeo = new THREE.BufferGeometry();
  const particlePositions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const angle = (i / particleCount) * Math.PI * 2;
    particlePositions[i*3] = Math.cos(angle) * 4.8;
    particlePositions[i*3+1] = Math.sin(angle) * 4.8;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
  const particleMat = new THREE.PointsMaterial({ size: 0.12, color: 0x00ff88, blending: THREE.AdditiveBlending });
  const particlesRing = new THREE.Points(particleGeo, particleMat);
  scene.add(particlesRing);
  
  // Grid and stars
  const gridHelper = new THREE.GridHelper(32, 28, 0x33ff66, 0x226622);
  gridHelper.position.y = -3.5;
  scene.add(gridHelper);
  
  const starsGeo = new THREE.BufferGeometry();
  const starsCount = 1800;
  const starsPos = new Float32Array(starsCount * 3);
  for (let i = 0; i < starsCount; i++) {
    starsPos[i*3] = (Math.random() - 0.5) * 200;
    starsPos[i*3+1] = (Math.random() - 0.5) * 100;
    starsPos[i*3+2] = (Math.random() - 0.5) * 80 - 40;
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
  const starsMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.07, transparent: true, opacity: 0.7 });
  const starsField = new THREE.Points(starsGeo, starsMat);
  scene.add(starsField);
  
  // --- AUDIO ENGINE: loads bg.mp3 and reacts strongly ---
  let audioCtx = null;
  let analyser = null;
  let sourceNode = null;
  let isPlaying = false;
  let musicBuffer = null;
  let synthOsc1 = null, synthOsc2 = null, synthGain = null;
  
  function initAudioContext() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (!analyser) {
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
    }
    return audioCtx;
  }
  
  async function loadMusic() {
    try {
      const response = await fetch('bg.mp3');
      if (!response.ok) throw new Error();
      const arrayBuffer = await response.arrayBuffer();
      const ctx = initAudioContext();
      musicBuffer = await ctx.decodeAudioData(arrayBuffer);
      return true;
    } catch (err) {
      console.log('bg.mp3 not found – using ambient synth');
      return false;
    }
  }
  
  function startAmbientSynth() {
    if (!audioCtx) initAudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (synthOsc1) { try { synthOsc1.stop(); } catch(e) {} synthOsc1 = null; }
    if (synthOsc2) { try { synthOsc2.stop(); } catch(e) {} synthOsc2 = null; }
    if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const masterGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 750;
    filter.Q.value = 6;
    masterGain.gain.value = 0.28;
    osc1.type = 'sine';
    osc1.frequency.value = 76.0;
    osc2.type = 'triangle';
    osc2.frequency.value = 152.0;
    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(masterGain);
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
    osc1.start();
    osc2.start();
    
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.45;
    lfoGain.gain.value = 10;
    lfo.connect(lfoGain);
    lfoGain.connect(osc1.frequency);
    lfo.start();
    
    synthOsc1 = osc1;
    synthOsc2 = osc2;
    synthGain = masterGain;
    isPlaying = true;
    document.getElementById('audioControl').innerHTML = '<i class="fas fa-pause"></i>';
  }
  
  async function startCustomMusic() {
    if (!musicBuffer) {
      const loaded = await loadMusic();
      if (!loaded) { startAmbientSynth(); return; }
    }
    if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
    if (synthOsc1) { try { synthOsc1.stop(); } catch(e) {} synthOsc1 = null; }
    if (synthOsc2) { try { synthOsc2.stop(); } catch(e) {} synthOsc2 = null; }
    if (!audioCtx) initAudioContext();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const newSource = audioCtx.createBufferSource();
    newSource.buffer = musicBuffer;
    newSource.loop = true;
    newSource.connect(analyser);
    analyser.connect(audioCtx.destination);
    newSource.start();
    sourceNode = newSource;
    isPlaying = true;
    document.getElementById('audioControl').innerHTML = '<i class="fas fa-pause"></i>';
  }
  
  function toggleMusic() {
    if (!audioCtx) initAudioContext();
    if (isPlaying) {
      if (sourceNode) { try { sourceNode.stop(); } catch(e) {} sourceNode = null; }
      if (synthOsc1) { try { synthOsc1.stop(); } catch(e) {} synthOsc1 = null; }
      if (synthOsc2) { try { synthOsc2.stop(); } catch(e) {} synthOsc2 = null; }
      isPlaying = false;
      document.getElementById('audioControl').innerHTML = '<i class="fas fa-play"></i>';
    } else {
      if (musicBuffer) startCustomMusic();
      else startAmbientSynth();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  
  function getAudioIntensity() {
    if (isPlaying && analyser && audioCtx?.state === 'running') {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      let raw = sum / (data.length * 255);
      return Math.min(0.95, Math.max(0.2, raw * 1.3));
    } else {
      // gentle idle movement
      return 0.3 + Math.sin(Date.now() * 0.002) * 0.1;
    }
  }
  
  document.getElementById('audioControl').addEventListener('click', toggleMusic);
  
  // Auto-start music on first interaction
  window.addEventListener('click', async () => {
    if (!audioCtx) {
      initAudioContext();
      await loadMusic();
      if (musicBuffer) startCustomMusic();
      else startAmbientSynth();
    } else if (audioCtx.state === 'suspended' && !isPlaying) {
      audioCtx.resume();
      if (musicBuffer) startCustomMusic();
      else startAmbientSynth();
    }
  }, { once: true });
  
  // ---------- SCROLL CONTENT (crossfade unchanged) ----------
  const scenesData = [
    { 
      id: 'hero',
      html: `
        <div class="hero-flex">
          <img src="/aswanth-r-nodex-ar.png" alt="Aswanth R" class="profile-img" onerror="this.src='https://ui-avatars.com/api/?background=0D1117&color=00ff41&bold=true&size=140&name=ASWANTH+R'">
          <div class="hero-content">
            <div class="badge">✦ ETHICAL HACKER / PYTHON DEV</div>
            <h1>Breaking <span class="gradient-text">systems</span><br>fixing <span class="gradient-text">code</span></h1>
            <p class="desc">ISC2 Candidate · Penetration testing · Python automation · Code fixer. 1000+ contributions.</p>
            <div class="quote">“If it’s code, I can fix it.” — Aswanth R</div>
          </div>
        </div>
      `
    },
    {
      id: 'stats',
      html: `
        <h2 class="gradient-text" style="font-size:2rem; margin-bottom:1rem;">Impact & Metrics</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-number">1,250+</div><div class="stat-label">CONTRIBUTIONS</div></div>
          <div class="stat-card"><div class="stat-number">34+</div><div class="stat-label">ACTIVE REPOS</div></div>
          <div class="stat-card"><div class="stat-number">58K+</div><div class="stat-label">LINES FIXED</div></div>
          <div class="stat-card"><div class="stat-number">1.8K+</div><div class="stat-label">BREACHES PATCHED</div></div>
        </div>
        <div class="quote" style="margin-top:1.5rem;">Every line of code tells a story of resilience & precision.</div>
      `
    },
    {
      id: 'skills',
      html: `
        <h2 class="gradient-text" style="font-size:2rem; margin-bottom:1rem;">Cyber Arsenal</h2>
        <div class="skills-grid">
          <div class="skill-card"><i class="fab fa-python skill-icon"></i><div class="skill-title">PYTHON</div><div>Advanced • Automation • Exploit Dev</div></div>
          <div class="skill-card"><i class="fas fa-lock skill-icon"></i><div class="skill-title">ETHICAL HACKING</div><div>Pen Testing • Reverse Engineering</div></div>
          <div class="skill-card"><i class="fas fa-globe skill-icon"></i><div class="skill-title">WEB TECH</div><div>JS/HTML/CSS • React • Node.js</div></div>
          <div class="skill-card"><i class="fas fa-bolt skill-icon"></i><div class="skill-title">CODE FIXER</div><div>Debug • Refactor • Optimize</div></div>
        </div>
      `
    },
    {
      id: 'contact',
      html: `
        <h2 class="gradient-text" style="font-size:2rem; margin-bottom:1rem;">Connect Securely</h2>
        <div class="contact-links">
          <a href="https://github.com/Nodex-AR" target="_blank" class="contact-link"><i class="fab fa-github"></i> GitHub/Nodex-AR</a>
          <a href="#" id="secureEmailBtn" class="contact-link"><i class="fas fa-envelope"></i> Secure Message</a>
        </div>
        <div class="quote" style="margin-top:1.5rem;">Let’s build something unbreakable together.</div>
      `
    }
  ];
  
  const layerA = document.getElementById('sceneLayerA');
  const layerB = document.getElementById('sceneLayerB');
  let activeLayer = 'A';
  let currentSceneIdx = 0;
  
  function setSceneContent(layer, html) {
    layer.innerHTML = html;
    const emailBtn = layer.querySelector('#secureEmailBtn');
    if (emailBtn) {
      emailBtn.addEventListener('click', (e) => {
        e.preventDefault();
        navigator.clipboard.writeText('aswanthr82@gmail.com');
        const btn = e.currentTarget;
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => btn.innerHTML = original, 1500);
      });
    }
  }
  
  setSceneContent(layerA, scenesData[0].html);
  layerA.classList.add('active');
  
  ScrollTrigger.create({
    trigger: '.scroll-tracker',
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1.0,
    onUpdate: (self) => {
      const progress = self.progress;
      const targetIdx = Math.min(Math.floor(progress * scenesData.length), scenesData.length - 1);
      if (targetIdx !== currentSceneIdx) {
        currentSceneIdx = targetIdx;
        const activeElem = activeLayer === 'A' ? layerA : layerB;
        const inactiveElem = activeLayer === 'A' ? layerB : layerA;
        setSceneContent(inactiveElem, scenesData[currentSceneIdx].html);
        gsap.to(activeElem, { duration: 0.45, opacity: 0, onComplete: () => {
          activeElem.classList.remove('active');
          inactiveElem.classList.add('active');
          gsap.to(inactiveElem, { duration: 0.45, opacity: 1 });
          activeLayer = activeLayer === 'A' ? 'B' : 'A';
        }});
      }
      starsField.rotation.y = progress * 0.6;
    }
  });
  
  // --- REACTIVITY: color, glow, size, particles, rotation ---
  function reactToAudio() {
    const intensity = getAudioIntensity();
    // Core color shift from green to bright cyan/white based on intensity
    const hue = 120 - intensity * 30; // green → cyan
    const sat = 1.0;
    const light = 0.5 + intensity * 0.3;
    coreMat.color.setHSL(hue / 360, sat, light);
    coreMat.emissive.setHSL(hue / 360, sat, 0.6);
    coreMat.emissiveIntensity = 0.5 + intensity * 1.2;
    // Bloom strength (glow)
    bloomPass.strength = 0.7 + intensity * 1.3;
    // Core scale
    const scaleCore = 1 + intensity * 0.15;
    core.scale.setScalar(scaleCore);
    // Cage scale
    cage.scale.setScalar(1 + intensity * 0.08);
    // Particle size and color
    particleMat.size = 0.12 + intensity * 0.12;
    particleMat.color.setHSL(0.3 + intensity * 0.1, 1.0, 0.6);
    // Rotation speed
    controls.autoRotateSpeed = 0.5 + intensity * 0.9;
    // Slight background fog adjustment (optional)
    scene.fog.density = 0.02 + intensity * 0.01;
  }
  
  function animate() {
    requestAnimationFrame(animate);
    reactToAudio();
    controls.update();
    composer.render();
  }
  animate();
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
